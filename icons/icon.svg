<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6a3d" />
      <stop offset="1" stop-color="#ff3b30" />
    </linearGradient>
  </defs>

  <!-- 角丸の地 -->
  <rect x="6" y="6" width="116" height="116" rx="26" fill="url(#bg)" />

  <!-- マーキングを表す破線の枠 -->
  <rect x="30" y="34" width="68" height="56" rx="8"
        fill="none" stroke="#ffffff" stroke-width="7"
        stroke-dasharray="13 9" stroke-linecap="round" />

  <!-- 番号バッジ（左上に重ねる） -->
  <circle cx="34" cy="38" r="17" fill="#1d1b1a" />
  <text x="34" y="38" fill="#ffffff"
        font-family="-apple-system, Segoe UI, system-ui, sans-serif"
        font-size="22" font-weight="700"
        text-anchor="middle" dominant-baseline="central">1</text>
</svg>
