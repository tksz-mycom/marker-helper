<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marker:HELPER — 一覧</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header class="mm-bar">
      <div class="mm-bar-title">
        <span class="mm-logo" aria-hidden="true"></span>
        <h1>マーカー</h1>
        <span id="mm-count" class="mm-pill">0</span>
      </div>
      <!-- マーキングモード（主操作。ポップアップと同じ操作をパネルからも行える） -->
      <label class="mm-toggle">
        <span class="mm-toggle-text">
          <strong>マーキングモード</strong>
          <small>ホバーで強調・クリックで固定</small>
        </span>
        <input type="checkbox" id="mm-enabled" />
        <span class="mm-switch" aria-hidden="true"></span>
      </label>

      <!-- マーカー一覧ファイル選択用の隠し input -->
      <input type="file" id="mm-import-file" accept="application/json,.json" class="mm-visually-hidden" tabindex="-1" aria-hidden="true" />

      <!-- 表示・出力の設定と、それに対応する操作（コピー／入出力）をまとめる -->
      <div class="mm-options">
        <div class="mm-opt-row">
          <span class="mm-opt-label">セレクタ</span>
          <div class="mm-segmented" id="mm-selformat" role="radiogroup" aria-label="セレクタ形式">
            <button type="button" data-value="css" class="is-active">CSS</button>
            <button type="button" data-value="xpath">XPath</button>
          </div>
          <button type="button" id="mm-copy-all" class="mm-tool" title="表示中の全セレクタをこの形式でコピー" aria-label="全セレクタをコピー">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
          </button>
          <button type="button" id="mm-clear-all" class="mm-tool mm-tool-danger" title="すべてクリア" aria-label="すべてクリア">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
          </button>
        </div>
        <div class="mm-opt-row">
          <span class="mm-opt-label">出力形式</span>
          <select id="mm-export-format" class="mm-select" aria-label="エクスポート形式">
            <option value="json">JSON（復元可）</option>
            <option value="csv">CSV</option>
            <option value="md">Markdown</option>
            <option value="pw">Playwright</option>
            <option value="cy">Cypress</option>
          </select>
          <button type="button" id="mm-export" class="mm-tool" title="選択した形式でマーカー一覧を保存（エクスポート）" aria-label="エクスポート">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
          </button>
          <button type="button" id="mm-import" class="mm-tool" title="JSONファイルからマーカー一覧を復元（インポート）" aria-label="インポート">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
          </button>
        </div>
      </div>

      <!-- マーカーの絞り込み（タグ・セレクタ・テキスト・メモを対象） -->
      <input type="search" id="mm-filter" class="mm-filter" placeholder="絞り込み（タグ・セレクタ・テキスト・メモ）" aria-label="マーカーを絞り込み" />

      <!-- スクショ関連（全画像の一括保存 → 既定設定）の順にまとめる -->
      <div class="mm-shot-row">
        <button type="button" id="mm-shot-all" class="mm-tool" title="表示中の全マーカーの画像をまとめて保存" aria-label="全マーカーの画像を保存">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
            <circle cx="12" cy="13" r="4" />
          </svg>
        </button>
        <button type="button" id="mm-report" class="mm-tool" title="番号・セレクタ・メモ・スクショをまとめたHTMLレポートを保存（印刷でPDF化できます）" aria-label="レポートを保存">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <line x1="10" y1="9" x2="8" y2="9" />
          </svg>
        </button>
        <label class="mm-shot-opt" title="各マーカーの既定値。行ごとの「マーカー込み」で個別に上書きできる">
          <input type="checkbox" id="mm-shot-marks" />
          <span>スクショに枠・連番ラベルを含める（既定）</span>
        </label>
      </div>
    </header>

    <p id="mm-empty" class="mm-empty">
      <span class="mm-empty-mark" aria-hidden="true"></span>
      まだマーカーがありません。<br />
      ポップアップかこのパネルで<strong>マーキングモード</strong>をオンにして、<br />
      ページ上の要素をクリックしてください。
    </p>

    <p id="mm-nomatch" class="mm-empty" hidden>条件に一致するマーカーがありません。</p>

    <ul id="mm-list" class="mm-list"></ul>

    <!-- 1件分のテンプレート -->
    <template id="mm-item-tpl">
      <li class="mm-item">
        <!-- 連番バッジと並べ替えボタンを左の同じ列にまとめる -->
        <div class="mm-rail">
          <span class="mm-badge"></span>
          <!-- ドラッグの代替: クリックで並び順を調整する（端ボタンは最上段／最下段へ一気に移動） -->
          <div class="mm-move" role="group" aria-label="並び順の移動">
            <button type="button" class="mm-move-btn mm-act-move-top" title="最上段へ移動" aria-label="最上段へ移動">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13l-6-6-6 6M18 18l-6-6-6 6" /></svg>
            </button>
            <button type="button" class="mm-move-btn mm-act-move-up" title="1つ上へ移動" aria-label="1つ上へ移動">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 15l-6-6-6 6" /></svg>
            </button>
            <button type="button" class="mm-move-btn mm-act-move-down" title="1つ下へ移動" aria-label="1つ下へ移動">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6" /></svg>
            </button>
            <button type="button" class="mm-move-btn mm-act-move-bottom" title="最下段へ移動" aria-label="最下段へ移動">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l6 6 6-6M6 11l6 6 6-6" /></svg>
            </button>
          </div>
        </div>
        <div class="mm-item-body">
          <div class="mm-item-head">
            <span class="mm-tag"></span>
            <!-- 分類用のグループ名チップ（名前から色を割り当てる・未設定時は非表示） -->
            <span class="mm-group-chip" hidden></span>
            <!-- 現在表示中のセレクタが壊れにくいかの目安（安定/普通/不安定） -->
            <span class="mm-robust" hidden></span>
            <span class="mm-detached" hidden>消失</span>
          </div>
          <!-- セレクタ表示領域。右上にコピー・位置へのアイコンボタンを縦に重ねる -->
          <div class="mm-selector-wrap">
            <code class="mm-selector"></code>
            <div class="mm-selector-tools">
              <button type="button" class="mm-selector-tool mm-act-copy" title="セレクタをコピー" aria-label="セレクタをコピー">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
              </button>
              <button type="button" class="mm-selector-tool mm-act-locate" title="要素の位置へ移動" aria-label="要素の位置へ移動">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="11" cy="11" r="8" />
                  <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
              </button>
            </div>
          </div>
          <span class="mm-text"></span>
          <!-- 要素まわりの操作: 中身（テキスト/HTML）のコピーと情報の表示を1行にまとめる -->
          <div class="mm-content-copy" role="group" aria-label="要素の操作">
            <button type="button" class="mm-act mm-act-copy-text">テキスト</button>
            <button type="button" class="mm-act mm-act-copy-html">HTML</button>
            <button type="button" class="mm-act mm-act-inspect" aria-expanded="false" aria-label="要素の情報を表示" title="要素の情報を表示（サイズ・色・コントラスト・role）">情報</button>
          </div>
          <!-- 要素のインスペクト情報（クリックで開閉・内容は開いたときに取得する） -->
          <dl class="mm-inspect" hidden></dl>
          <!-- 分類用のグループ名（任意）。同名は同色のチップでまとまり、絞り込み対象にもなる -->
          <input type="text" class="mm-group" maxlength="30" placeholder="グループ名（任意）…" aria-label="グループ名" />
          <!-- マーカーごとの自由記述メモ（注釈）。エクスポートにも含まれる -->
          <input type="text" class="mm-note" maxlength="500" placeholder="メモを追加…" aria-label="メモ" />
          <div class="mm-item-actions">
            <!-- 色スウォッチと枠の詳細設定（吹き出し）を1つのクラスタにまとめる -->
            <div class="mm-style-cluster">
              <!-- このマーカーの色を個別に変更する（新規マークの既定色には影響しない） -->
              <label class="mm-color" title="このマーカーの色を変更">
                <input type="color" class="mm-act-color" aria-label="マーカーの色" />
              </label>
              <!-- 既定では非表示の枠設定（線種・線幅・余白・角丸・透明度）を開く歯車ボタン -->
              <button type="button" class="mm-act-style-toggle" aria-expanded="false" aria-haspopup="dialog" title="枠の詳細設定（線種・線幅・余白・角丸・透明度）" aria-label="枠の詳細設定">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="12" r="3" />
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
              </button>
              <!-- 枠の詳細設定の吹き出し。既定では非表示で、歯車ボタンで開閉する -->
              <div class="mm-style-pop" role="dialog" aria-label="枠の詳細設定" hidden>
                <div class="mm-style-row">
                  <span class="mm-style-label">透明度</span>
                  <input type="range" class="mm-range mm-style-transparency" min="0" max="100" step="1" aria-label="透明度" />
                  <input type="number" class="mm-num mm-style-transparency-num" min="0" max="100" step="1" aria-label="透明度(%)" />
                  <span class="mm-unit">%</span>
                </div>
                <div class="mm-style-row">
                  <span class="mm-style-label">線種</span>
                  <div class="mm-segmented mm-style-line" role="radiogroup" aria-label="線種">
                    <button type="button" data-value="solid">実線</button>
                    <button type="button" data-value="dashed">破線</button>
                    <button type="button" data-value="dotted">点線</button>
                  </div>
                </div>
                <div class="mm-style-row">
                  <span class="mm-style-label">線幅</span>
                  <input type="range" class="mm-range mm-style-width" min="1" max="20" step="1" aria-label="線幅" />
                  <input type="number" class="mm-num mm-style-width-num" min="1" max="20" step="1" aria-label="線幅(px)" />
                  <span class="mm-unit">px</span>
                </div>
                <div class="mm-style-row">
                  <span class="mm-style-label">余白</span>
                  <input type="range" class="mm-range mm-style-padding" min="0" max="40" step="1" aria-label="余白" />
                  <input type="number" class="mm-num mm-style-padding-num" min="0" max="40" step="1" aria-label="余白(px)" />
                  <span class="mm-unit">px</span>
                </div>
                <div class="mm-style-row">
                  <span class="mm-style-label">角丸</span>
                  <input type="range" class="mm-range mm-style-radius" min="0" max="40" step="1" aria-label="角丸" />
                  <input type="number" class="mm-num mm-style-radius-num" min="0" max="40" step="1" aria-label="角丸(px)" />
                  <span class="mm-unit">px</span>
                </div>
                <div class="mm-style-row">
                  <label class="mm-style-check" title="このマーカーの連番ラベルの表示/非表示を切り替える">
                    <input type="checkbox" class="mm-style-showlabel" />
                    <span>連番ラベルを表示</span>
                  </label>
                </div>
              </div>
            </div>
            <!-- スクリーンショット関連の操作を1つの帯にまとめて関連を示す -->
            <div class="mm-shot-group" role="group" aria-label="スクリーンショット">
              <svg class="mm-shot-group-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                <circle cx="12" cy="13" r="4" />
              </svg>
              <label class="mm-shot-incl" title="このマーカーのスクリーンショットにマーカー・連番ラベルを含める">
                <input type="checkbox" class="mm-act-shot-incl" />
                <span>マーカー込み</span>
              </label>
              <!-- 「保存」「コピー」をくっつけたセグメント表示 -->
              <div class="mm-shot-btns">
                <button type="button" class="mm-act mm-act-shot">保存</button>
                <button type="button" class="mm-act mm-act-shot-copy">コピー</button>
              </div>
            </div>
          </div>
        </div>
        <!-- マーカー設定を閉じる（クリア）。ウィンドウの×のように右上へ配置 -->
        <button type="button" class="mm-item-close" title="このマーカーをクリア" aria-label="このマーカーをクリア">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </li>
    </template>

    <div id="mm-toast" class="mm-toast" role="status" aria-live="polite" hidden></div>

    <script src="../shared/label.js"></script>
    <script src="../shared/reorderController.js"></script>
    <script src="panel.js"></script>
  </body>
</html>
