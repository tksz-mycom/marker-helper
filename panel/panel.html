<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marker:HELPER — 一覧</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header class="mm-bar">
      <div class="mm-bar-title">
        <span class="mm-logo" aria-hidden="true"></span>
        <h1>マーク一覧</h1>
        <span id="mm-count" class="mm-pill">0</span>
      </div>
      <div class="mm-bar-actions">
        <button type="button" id="mm-copy-all" class="mm-icon-btn" title="全セレクタをコピー">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
          <span>まとめてコピー</span>
        </button>
        <button type="button" id="mm-clear-all" class="mm-icon-btn mm-danger" title="すべてクリア">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
          <span>すべてクリア</span>
        </button>
      </div>
      <div class="mm-bar-actions">
        <button type="button" id="mm-export" class="mm-icon-btn" title="マーク一覧をJSONファイルに保存">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          <span>エクスポート</span>
        </button>
        <button type="button" id="mm-import" class="mm-icon-btn" title="JSONファイルからマーク一覧を復元">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          <span>インポート</span>
        </button>
      </div>
      <!-- マーク一覧ファイル選択用の隠し input -->
      <input type="file" id="mm-import-file" accept="application/json,.json" class="mm-visually-hidden" tabindex="-1" aria-hidden="true" />
      <label class="mm-shot-opt" title="画像に枠・連番バッジを写し込むか">
        <input type="checkbox" id="mm-shot-marks" />
        <span>画像に枠・番号を含める</span>
      </label>
    </header>

    <p id="mm-empty" class="mm-empty">
      <span class="mm-empty-mark" aria-hidden="true"></span>
      まだマークがありません。<br />
      ポップアップで<strong>マークモード</strong>をオンにして、<br />
      ページ上の要素をクリックしてください。
    </p>

    <ul id="mm-list" class="mm-list"></ul>

    <!-- 1件分のテンプレート -->
    <template id="mm-item-tpl">
      <li class="mm-item">
        <span class="mm-badge"></span>
        <div class="mm-item-body">
          <div class="mm-item-head">
            <span class="mm-tag"></span>
            <span class="mm-detached" hidden>消失</span>
          </div>
          <code class="mm-selector"></code>
          <span class="mm-text"></span>
          <div class="mm-item-actions">
            <button type="button" class="mm-act mm-act-copy">コピー</button>
            <button type="button" class="mm-act mm-act-locate">位置へ</button>
            <button type="button" class="mm-act mm-act-shot">画像保存</button>
            <button type="button" class="mm-act mm-act-shot-copy">画像コピー</button>
            <button type="button" class="mm-act mm-act-delete">削除</button>
          </div>
        </div>
      </li>
    </template>

    <div id="mm-toast" class="mm-toast" role="status" aria-live="polite" hidden></div>

    <script src="panel.js"></script>
  </body>
</html>
